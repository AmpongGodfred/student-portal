<!-- base.html -->
<!-- This is the parent template. Every other page extends this one. -->
<!-- The navbar and footer live here so we never repeat them. -->

<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}Student Portal{% endblock %}</title>

    <!-- Link to our CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
    </head>
    <body>

    <!-- ── NAVBAR ─────────────────────────────────────────────── -->
<!-- ── NAVBAR ─────────────────────────────────────────────── -->
<nav class="navbar">
  <!-- Logo -->
  <a href="{{ url_for('index') }}" class="navbar-logo">
    Student<span>Portal</span>
  </a>

  <!-- Hamburger button (only visible on mobile) -->
  <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">
    &#9776; <!-- This is the ☰ icon -->
  </button>

  <!-- Navigation links -->
  <ul class="nav-links" id="nav-links">
    <li><a href="{{ url_for('index') }}">Home</a></li>

    {% if session.get("admin") %}
      <li><a href="{{ url_for('form') }}">Add Student</a></li>
      <li><a href="{{ url_for('students') }}">All Students</a></li>
      <li><a href="{{ url_for('logout') }}" class="btn-logout">Logout</a></li>
    {% else %}
      <li><a href="{{ url_for('login') }}">Get Started</a></li>
    {% endif %}
  </ul>
</nav>
<!-- ── END NAVBAR ─────────────────────────────────────────── -->
    <!-- ── END NAVBAR ─────────────────────────────────────────── -->


    <!-- ── MAIN CONTENT ───────────────────────────────────────── -->
    <!-- Each child page fills this block with its own content -->
    {% block content %}{% endblock %}
    <!-- ── END MAIN CONTENT ───────────────────────────────────── -->


    <!-- ── FOOTER ─────────────────────────────────────────────── -->
    <footer class="footer">
        <p>All rights reserved &copy; Student Portal 2024</p>
    </footer>
    <!-- ── END FOOTER ─────────────────────────────────────────── -->

    <!-- Page-specific JavaScript block (optional per page) -->
    {% block scripts %}{% endblock %}

    <!-- Hamburger menu toggle -->
<script>
  const hamburgerBtn = document.getElementById("hamburger-btn");
  const navLinks = document.getElementById("nav-links");

  hamburgerBtn.addEventListener("click", function () {
    // Toggle the "open" class — CSS shows/hides the menu based on this
    navLinks.classList.toggle("open");
  });
</script>

    </body>
</html>
