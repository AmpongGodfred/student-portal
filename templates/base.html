<!-- base.html -->
<!-- This is the parent template. Every other page extends this one. -->
<!-- The navbar and footer live here so we never repeat them. -->

<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}Student Portal{% endblock %}</title>

    <!-- Link to our CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
    </head>
    <body>

    <!-- ── NAVBAR ─────────────────────────────────────────────── -->
    <nav class="navbar">
        <!-- Logo acts as a home link -->
        <a href="{{ url_for('index') }}" class="navbar-logo">
        Student<span>Portal</span>
        </a>

        <!-- Navigation links -->
        <ul class="nav-links">
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('form') }}">Get Started</a></li>
        </ul>
    </nav>
    <!-- ── END NAVBAR ─────────────────────────────────────────── -->


    <!-- ── MAIN CONTENT ───────────────────────────────────────── -->
    <!-- Each child page fills this block with its own content -->
    {% block content %}{% endblock %}
    <!-- ── END MAIN CONTENT ───────────────────────────────────── -->


    <!-- ── FOOTER ─────────────────────────────────────────────── -->
    <footer class="footer">
        <p>All rights reserved &copy; Student Portal 2024</p>
    </footer>
    <!-- ── END FOOTER ─────────────────────────────────────────── -->

    <!-- Page-specific JavaScript block (optional per page) -->
    {% block scripts %}{% endblock %}

    </body>
</html>
